<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GT City Racer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Courier New',monospace;touch-action:none}
canvas{display:block}
#hud{position:fixed;top:8px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:10;pointer-events:none}
.hb{background:rgba(0,0,0,.7);border:1px solid rgba(0,200,255,.4);color:#0cf;padding:4px 10px;font-size:10px;text-transform:uppercase;letter-spacing:1px}
.hb .v{font-size:20px;color:#fff}
#ctrl{position:fixed;top:8px;right:8px;z-index:10;color:#0cf;font-size:10px;background:rgba(0,0,0,.7);border:1px solid rgba(0,200,255,.3);padding:8px;line-height:1.6}
body.mob #ctrl{display:none}
#mctrl{display:none;position:fixed;bottom:0;left:0;right:0;top:0;z-index:20;pointer-events:none}
body.mob #mctrl{display:block}
.tz{position:absolute;pointer-events:auto;touch-action:none}
#sz{left:0;bottom:0;width:50%;height:55%}
#wheel{position:absolute;width:180px;height:180px;border-radius:50%;border:3px solid rgba(0,200,255,.3);left:20px;bottom:30px;pointer-events:none;transition:none}
#wheel-grip{position:absolute;width:22px;height:22px;border-radius:50%;background:rgba(0,200,255,.6);border:2px solid rgba(0,200,255,.8);top:-11px;left:50%;margin-left:-11px;pointer-events:none}
#wheel-spoke1,#wheel-spoke2{position:absolute;background:rgba(0,200,255,.15);pointer-events:none}
#wheel-spoke1{width:2px;height:100%;left:50%;margin-left:-1px;top:0}
#wheel-spoke2{height:2px;width:100%;top:50%;margin-top:-1px;left:0}
#wheel-center{position:absolute;width:40px;height:40px;border-radius:50%;border:2px solid rgba(0,200,255,.2);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
#wheel-label{position:absolute;bottom:8px;left:110px;transform:translateX(-50%);color:rgba(0,200,255,.4);font-size:9px;letter-spacing:2px;pointer-events:none}
.pb{position:absolute;width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:inherit;font-size:10px;color:#fff;pointer-events:auto;touch-action:none;-webkit-tap-highlight-color:transparent;user-select:none}
#bg{right:16px;bottom:10px;background:rgba(0,180,0,.25);border:2px solid rgba(0,220,0,.4)}#bg.a{background:rgba(0,220,0,.45)}
#bb{right:96px;bottom:10px;background:rgba(180,0,0,.25);border:2px solid rgba(220,0,0,.4)}#bb.a{background:rgba(220,0,0,.45)}
#ebrake-track{position:absolute;right:28px;bottom:95px;width:48px;height:90px;border-radius:24px;background:rgba(60,60,60,.3);border:1px solid rgba(180,120,0,.3);pointer-events:auto;touch-action:none;-webkit-tap-highlight-color:transparent}
#ebrake-handle{position:absolute;top:4px;left:4px;width:40px;height:34px;border-radius:20px;background:rgba(180,120,0,.35);border:2px solid rgba(220,160,0,.5);display:flex;align-items:center;justify-content:center;font-size:7px;color:rgba(220,160,0,.8);letter-spacing:1px;transition:top 0.3s cubic-bezier(0.2,1.5,0.5,1);pointer-events:none}
#ebrake-track.pulled #ebrake-handle{top:50px;background:rgba(220,160,0,.5)}
#ebrake-label{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);color:rgba(220,160,0,.3);font-size:7px;letter-spacing:1px;pointer-events:none}
#settings-btn{position:fixed;top:8px;right:8px;z-index:30;background:rgba(0,0,0,.8);border:1px solid rgba(0,200,255,.5);color:#0cf;font-family:inherit;font-size:16px;padding:5px 10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
#settings-panel{display:none;position:fixed;top:44px;right:8px;z-index:30;background:rgba(0,0,0,.9);border:1px solid rgba(0,200,255,.4);padding:12px;color:#0cf;font-size:11px;letter-spacing:1px}
#settings-panel.open{display:block}
.set-row{padding:6px 0;border-bottom:1px solid rgba(0,200,255,.15);pointer-events:auto;cursor:pointer;-webkit-tap-highlight-color:transparent}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;z-index:100;color:#0cf;font-size:14px;letter-spacing:2px}
#life-hud{position:fixed;top:8px;left:8px;z-index:10;pointer-events:none;color:#0cf;font-size:10px;letter-spacing:1px}
#life-hud .lh{background:rgba(0,0,0,.7);border:1px solid rgba(0,200,255,.3);padding:4px 8px;margin-bottom:3px;display:flex;gap:8px;align-items:center}
#life-hud .lh .lv{color:#fff;font-size:14px;font-weight:bold}
#fuel-bar{width:60px;height:8px;background:rgba(255,255,255,.1);border:1px solid rgba(0,200,255,.3);display:inline-block;vertical-align:middle}
#fuel-fill{height:100%;background:#0c6;transition:width .3s}
#hp-bar{width:60px;height:8px;background:rgba(255,255,255,.1);border:1px solid rgba(0,200,255,.3);display:inline-block;vertical-align:middle}
#hp-fill{height:100%;background:#c60;transition:width .3s}
#menu-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:50;overflow-y:auto;padding:20px;color:#0cf;font-size:12px;letter-spacing:1px}
#menu-overlay.open{display:flex;flex-direction:column;align-items:center}
#menu-overlay h2{color:#fff;font-size:18px;margin:10px 0 6px;letter-spacing:3px}
#menu-overlay .m-section{background:rgba(0,40,60,.5);border:1px solid rgba(0,200,255,.3);padding:12px;margin:6px 0;width:90%;max-width:400px;border-radius:4px}
#menu-overlay .m-btn{background:rgba(0,200,255,.15);border:1px solid rgba(0,200,255,.5);color:#0cf;padding:8px 16px;margin:4px;cursor:pointer;font-family:inherit;font-size:11px;letter-spacing:1px;-webkit-tap-highlight-color:transparent}
#menu-overlay .m-btn:active{background:rgba(0,200,255,.35)}
#menu-overlay .m-btn.disabled{opacity:.4;pointer-events:none}
#menu-overlay .car-card{border:1px solid rgba(0,200,255,.2);padding:8px;margin:6px 0;background:rgba(0,20,30,.5);border-radius:3px}
#menu-overlay .car-card.owned{border-color:rgba(0,255,100,.4)}
#menu-overlay .car-card .car-name{color:#fff;font-size:13px;font-weight:bold}
#menu-overlay .car-card .car-stat{color:#8cf;font-size:10px;margin:2px 0}
#menu-overlay .close-btn{position:fixed;top:12px;right:12px;background:rgba(200,0,0,.3);border:1px solid rgba(255,0,0,.5);color:#f66;padding:6px 14px;cursor:pointer;font-family:inherit;font-size:14px;z-index:51;-webkit-tap-highlight-color:transparent}
#notif{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:16px;letter-spacing:2px;text-align:center;z-index:40;pointer-events:none;opacity:0;transition:opacity .3s;text-shadow:0 0 10px #0cf}
#notif.show{opacity:1}
#menu-btn{position:fixed;top:8px;left:50%;margin-left:140px;z-index:30;background:rgba(0,0,0,.8);border:1px solid rgba(0,200,255,.5);color:#0cf;font-family:inherit;font-size:10px;padding:5px 10px;cursor:pointer;letter-spacing:1px;-webkit-tap-highlight-color:transparent}
#job-indicator{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;color:#ff0;font-size:10px;letter-spacing:1px;background:rgba(0,0,0,.7);border:1px solid rgba(255,200,0,.3);padding:4px 10px;display:none}
</style>
</head>

function makeBldgTex(hue){
const c=document.createElement('canvas');c.width=32;c.height=64;const x=c.getContext('2d');
x.fillStyle=hue;x.fillRect(0,0,32,64);
for(let wy=2;wy<62;wy+=4){for(let wx=2;wx<30;wx+=4){
const r=Math.random();
if(r<0.55)x.fillStyle='#050508'; // most windows dark
else if(r<0.75)x.fillStyle=`rgba(${220+Math.random()*35|0},${200+Math.random()*55|0},${150+Math.random()*60|0},${0.5+Math.random()*0.5})`; // warm white/yellow
else if(r<0.88)x.fillStyle=`rgba(${180+Math.random()*75|0},${180+Math.random()*75|0},${170+Math.random()*85|0},${0.3+Math.random()*0.5})`; // cool white
else x.fillStyle=`rgba(${220+Math.random()*35|0},${160+Math.random()*40|0},${50+Math.random()*30|0},${0.3+Math.random()*0.4})`; // amber
x.fillRect(wx,wy,2,2);
}}
x.fillStyle='rgba(0,0,0,0.25)';x.fillRect(0,0,1,64);x.fillRect(31,0,1,64);
const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;return t;
}

// Override FileLoader to handle data URIs without fetch
class DataURILoader extends THREE.FileLoader {
  load(url,onLoad,onProgress,onError){
    if(typeof url==='string'&&url.startsWith('data:')){
      const idx=url.indexOf(',')+1;
      const b64=url.slice(idx);
      const bin=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
      setTimeout(()=>onLoad(bin.buffer),0);
      return;
    }
    return super.load(url,onLoad,onProgress,onError);
  }
}

// Patch the file loader used internally
const origLoad=THREE.FileLoader.prototype.load;
THREE.FileLoader.prototype.load=function(url,onLoad,onProgress,onError){
  if(typeof url==='string'&&url.startsWith('data:')){
    const idx=url.indexOf(',')+1;
    const isBase64=url.indexOf(';base64,')!==-1;
    if(isBase64){
      const b64=url.slice(idx);
      const bin=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
      if(this.responseType==='arraybuffer')setTimeout(()=>onLoad(bin.buffer),0);
      else setTimeout(()=>onLoad(new TextDecoder().decode(bin)),0);
      return;
    }
  }
  return origLoad.call(this,url,onLoad,onProgress,onError);
};

// ===== LOAD ROAD PACK (now that loader exists) =====
function loadRoadGLB(url){
  return new Promise((resolve,reject)=>{
    loader.load(url, gltf=>{
      const m=gltf.scene;
      m.updateMatrixWorld(true);
      const box=new THREE.Box3().setFromObject(m);
      const center=new THREE.Vector3();box.getCenter(center);
      m.position.set(-center.x,-box.min.y,-center.z);
      // Anti-z-fighting: polygon offset on all road materials
      m.traverse(child=>{
        if(child.isMesh&&child.material){
          const mat=child.material;
          mat.polygonOffset=true;
          mat.polygonOffsetFactor=-1;
          mat.polygonOffsetUnits=-1;
          mat.depthWrite=true;
        }
      });
      const w=new THREE.Group();w.add(m);
      w.scale.set(ROAD_SCALE,ROAD_SCALE,ROAD_SCALE);
      resolve(w);
    },undefined,reject);
  });
}

function loop(){

const sL=(K.a||K.arrowleft)&&!menuOpen,sR=(K.d||K.arrowright)&&!menuOpen;
// Keyboard steering
if(sL)wheelAngle=Math.min(wheelAngle+0.1,maxWheelAngle);
else if(sR)wheelAngle=Math.max(wheelAngle-0.1,-maxWheelAngle);

// 90s hydraulic power steering behavior:
// - Wheel stays where you put it at standstill (no caster forces when not rolling)
// - Self-centering only from caster trail forces, which require forward motion
// - When driver holds wheel (stOn), wheel tracks thumb position directly
// - When released at speed, caster pulls wheel back proportional to speed
// - When released at standstill, wheel stays put
const casterForce = stOn ? 0 : Math.max(as * 0.08, 0.02);
wheelAngle -= wheelAngle * casterForce;
if(!stOn && as < 0.01 && Math.abs(wheelAngle) < 0.01) wheelAngle = 0;

// Haptic feedback: road feel through steering, stronger at speed
if(stOn && as > 0.15 && Math.abs(wheelAngle) > 0.5){haptic(2)}

// Update visual wheel rotation
wheel.style.transform='rotate('+(-wheelAngle*180/Math.PI)+'deg)';

// Power steering: full assist at all speeds (hydraulic pump runs at idle too)
// Slightly less responsive at very low speeds due to tire scrub
const powerSteering = Math.min(as * 4, 1.0) * 0.8 + 0.2 * Math.min(as * 10, 1);
let steerTarget = (wheelAngle / maxWheelAngle) * powerSteering;
S.str += (steerTarget - S.str) * 0.15;
if(Math.abs(S.str) < 0.005) S.str = 0;

// === NFS UG2 TWO-STATE TIRE PHYSICS ===
const gasOn=(K.w||K.arrowup||(mob&&T.gas))&&!menuOpen&&!LIFE.broken;
const braking=(K[' ']||(mob&&T.brk))&&!menuOpen;
const ebrake=(K.shift||(mob&&T.ebrk))&&!menuOpen;
const spdFrac=as/VLT.MAX_SPEED;

// --- Engine torque from curve (up to 15 points in VLT) ---
if(gasOn){
  let acc=VLT.TORQUE[VLT.TORQUE.length-1][1];
  for(let i=0;i<VLT.TORQUE.length-1;i++){
    if(spdFrac>=VLT.TORQUE[i][0]&&spdFrac<VLT.TORQUE[i+1][0]){
      const t=(spdFrac-VLT.TORQUE[i][0])/(VLT.TORQUE[i+1][0]-VLT.TORQUE[i][0]);
      acc=VLT.TORQUE[i][1]*(1-t)+VLT.TORQUE[i+1][1]*t;break;
    }
  }
  S.spd=Math.min(S.spd+acc,VLT.MAX_SPEED);
} else if(K.s||K.arrowdown){
  S.spd=Math.max(S.spd-0.0015,-0.2);
} else if(as>0.001){
  // ENGINE_BRAKING (0.70-0.90 from VLT): decel when off throttle
  S.spd*=(1-0.002*VLT.ENGINE_BRAKING);
}

// --- Braking with front/rear bias (BRAKE_LOCK from VLT) ---
if(braking){
  if(S.spd>0.005){
    // Multiplicative braking for smooth decel, stronger at speed
    S.spd*=(1-VLT.BRAKE_FORCE);
    // Rear BRAKE_LOCK 3.4 = rear locks up much earlier
    const rearBrakeForce=VLT.BRAKE_FORCE*VLT.BRAKE_BIAS_R*0.1;
    if(rearBrakeForce>VLT.STATIC_GRIP_R*wR*0.5&&as>0.3){
      slipR=Math.min(1,slipR+0.03);
    }
    // Smooth stop at very low speed
    if(S.spd<0.005)S.spd=0;
  } else S.spd=Math.max(S.spd-0.0004,-0.2);
}
if(S.spd<0)S.spd=Math.max(S.spd,-0.2);

// --- EBRAKE: forces rear STATIC->DYNAMIC (handbrake drift initiation) ---
// "pressing handbrake locks rear wheels, forcing STATIC_GRIP to DYNAMIC_GRIP"
if(ebrake){
  gripR='DYNAMIC';
  slipR=Math.min(1,slipR+0.12);
  // EBRAKE_FORCE must exceed normal brake by >10% per VLT docs
  if(S.spd>0.005)S.spd*=(1-VLT.BRAKE_FORCE*VLT.EBRAKE_FORCE*0.2);
}

// --- Aerodynamic drag: F_drag = -C_drag * v * |v| (Marco Monster model) ---
S.spd-=S.spd*as*VLT.DRAG_COEFF*0.008;

// Snap to zero
if(!braking&&!ebrake&&!gasOn&&Math.abs(S.spd)<0.001)S.spd=0;

// --- Weight Transfer ---
// Accel shifts weight rear (helps FWD traction), braking shifts forward
const accelG=gasOn?0.15:(braking?-0.2:0);
wF=Math.max(0.35,Math.min(0.75,VLT.FRONT_WEIGHT_BIAS-accelG*VLT.ROLL_FACTOR));
wR=1-wF;

// --- Effective steering (speed-dependent lock from STEERING ratio) ---
// At speed, max steering angle reduces (tire physics, not power steering)
const speedSteerLimit=VLT.STEER_SPEED_LIMIT+(1-VLT.STEER_SPEED_LIMIT)*(1-spdFrac);
const steerAngle=S.str*VLT.MAX_STEER_ANGLE*speedSteerLimit;

// --- Lateral forces per axle ---
const latF=Math.abs(steerAngle)*as*1.5*wF;
const latR=(Math.abs(yawVel)*2+slipR*0.3)*as*wR;

// --- TWO-STATE GRIP TRANSITIONS ---
// Front axle
const gLimF=(gripF==='STATIC'?VLT.STATIC_GRIP_F:VLT.DYNAMIC_GRIP_F)*wF;
if(gripF==='STATIC'&&latF>gLimF*VLT.GRIP_BREAK){
  gripF='DYNAMIC';slipF=0.3;
}
if(gripF==='DYNAMIC'&&latF<gLimF*VLT.GRIP_RECOVER&&!ebrake){
  slipF*=0.9;if(slipF<0.05){gripF='STATIC';slipF=0;}
}
// Rear axle
const gLimR=(gripR==='STATIC'?VLT.STATIC_GRIP_R:VLT.DYNAMIC_GRIP_R)*wR;
if(gripR==='STATIC'&&latR>gLimR*VLT.GRIP_BREAK){
  gripR='DYNAMIC';slipR=0.3;
}
if(gripR==='DYNAMIC'&&latR<gLimR*VLT.GRIP_RECOVER&&!ebrake){
  slipR*=0.92;if(slipR<0.05){gripR='STATIC';slipR=0;}
}

// --- YAW CALCULATION (YAW_SPEED + YAW_CONTROL system) ---
// Speed factor: no yaw at standstill, ramps up gradually
const yawSpeedFactor=Math.min(as*3,1);

// Front generates yaw from steering (turn-in force)
const frontGrip=gripF==='STATIC'?VLT.STATIC_GRIP_F:VLT.DYNAMIC_GRIP_F*0.5;
const frontYaw=steerAngle*frontGrip*VLT.YAW_CONTROL_F*yawSpeedFactor;

// Rear: STATIC = stabilizing, DYNAMIC = destabilizing (drift)
let rearYaw;
if(gripR==='STATIC'){
  rearYaw=-yawVel*VLT.STATIC_GRIP_R*VLT.YAW_CONTROL_R*1.5;
} else {
  // DYNAMIC: rear slides out, but effect scales with SPEED
  // No spinning in place - you need momentum to drift
  rearYaw=yawVel*VLT.DYNAMIC_GRIP_R*slipR*0.3*yawSpeedFactor;
  rearYaw+=Math.sign(steerAngle||yawVel)*slipR*as*0.02;
}

// Combined yaw with YAW_SPEED governing rotation rate
const targetYaw=(frontYaw+rearYaw)*VLT.YAW_SPEED;
yawVel+=(targetYaw-yawVel)*VLT.TENSOR_STEER;
// Speed-dependent damping: heavy damping at low speed, lighter at high
yawVel*=0.85+Math.min(as*0.5,0.1);
// Hard cap on yaw velocity to prevent spinouts
yawVel=Math.max(-0.06,Math.min(0.06,yawVel));

// Apply yaw rotation - requires actual speed
S.a+=yawVel*Math.sign(S.spd||1)*Math.min(as*5,1);

if(gripR==='DYNAMIC')S.spd*=(1-0.003*slipR);
if(gripF==='DYNAMIC')S.spd*=(1-0.005*slipF); // front slide = worse

// --- Slip decay ---
if(!ebrake){slipR*=0.97;slipF*=0.95;}

// Auto-gear for HUD
const g=as<0.1?1:as<0.3?2:as<0.6?3:as<0.9?4:5;

// Brake lights
if(tailLightL){
  tailLightL.material.color.setHex(braking?0xff2200:0x880000);
  tailLightR.material.color.setHex(braking?0xff2200:0x880000);
  const gi=braking?1.8:0.2, gd=braking?10:4;
  if(tailGlow.left){tailGlow.left.intensity=gi;tailGlow.left.distance=gd;tailGlow.right.intensity=gi;tailGlow.right.distance=gd;}
  else{tailGlow.intensity=gi;tailGlow.distance=gd;}
}

const nx=S.px-Math.sin(S.a)*S.spd,nz=S.pz-Math.cos(S.a)*S.spd;
if(!hit(nx,nz)){S.px=nx;S.pz=nz}
else if(!hit(nx,S.pz)){S.px=nx;S.spd*=0.7}
else if(!hit(S.px,nz)){S.pz=nz;S.spd*=0.7}
else S.spd*=0.1;

if(typeof skyMesh!=='undefined'){skyMesh.position.x=car.position.x;skyMesh.position.z=car.position.z;if(typeof skyCap!=='undefined'){skyCap.position.x=car.position.x;skyCap.position.z=car.position.z;}}
// Wheel rotation based on speed
const wheelSpin=S.spd*3;
if(wheelFL)wheelFL.children[0].rotation.x-=wheelSpin;
if(wheelFR)wheelFR.children[0].rotation.x-=wheelSpin;
if(wheelRL)wheelRL.children[0].rotation.x-=wheelSpin;
if(wheelRR)wheelRR.children[0].rotation.x-=wheelSpin;

const gR=[0,0.12,0.25,0.42,0.62,0.83];
document.getElementById('sv').textContent=Math.floor(as*200);
document.getElementById('gv').textContent=S.spd<-0.001?'R':S.spd<0.001?'N':g;
document.getElementById('rv').textContent=S.spd===0?'800':Math.floor(((as-gR[g-1])/(gR[g]-gR[g-1]))*6000+1500);

updateCam();

requestAnimationFrame(loop);

  const p=LIFE.pendingParts[idx];
  const c=curCar();
  if(p.stat==='all'){c.hp=Math.min(100,c.hp+p.add);c.tires=Math.min(100,c.tires+p.add);c.engine=Math.min(100,c.engine+p.add);}
  else c[p.stat]=Math.min(100,c[p.stat]+p.add);
  LIFE.pendingParts.splice(idx,1);
  LIFE.broken=false;

  const ready=LIFE.pendingParts.filter(p=>{
    const h=(p.deliveryDay-LIFE.day)*24+(p.deliveryHour-LIFE.hour);
    return h<=0;
  });
  if(ready.length>0)showNotif(`☀ New day! ${ready.length} part${ready.length>1?'s':''} ready to install!`,2500);

// --- LIFE SIM TICK (called every frame) ---
function lifeSimTick(){
  const c=curCar();const db=curDB();
  const as=Math.abs(S.spd);

  // --- TIME PROGRESSION (1 real sec ≈ 5 game min) ---
  LIFE.timeAcc+=1/60; // ~60fps
  if(LIFE.timeAcc>=0.2){ // every 0.2 real sec = 1 game minute
    LIFE.timeAcc=0;
    LIFE.minute++;
    if(LIFE.minute>=60){LIFE.minute=0;LIFE.hour++;}
    if(LIFE.hour>=24){LIFE.hour=0;LIFE.day++;if(LIFE.day>7)LIFE.day=1;}
    // Check for part deliveries
    LIFE.pendingParts.forEach(p=>{
      const h=(p.deliveryDay-LIFE.day)*24+(p.deliveryHour-LIFE.hour);
      if(h===0&&LIFE.minute===0){
        showNotif(`📦 ${p.name} has arrived! Open PARTS to install.`,3000);
      }
    });
  }

  // --- DAY/NIGHT CYCLE ---
  const t=LIFE.hour+LIFE.minute/60;
  let sunIntensity,ambIntensity,fogColor;
  if(t>=6&&t<8){// dawn
    const f=(t-6)/2;
    sunIntensity=f*1.0;ambIntensity=0.4+f*0.8;
    fogColor=new THREE.Color().lerpColors(new THREE.Color(0x040408),new THREE.Color(0x334455),f);
  } else if(t>=8&&t<17){// day
    sunIntensity=1.0;ambIntensity=1.2;fogColor=new THREE.Color(0x556677);
  } else if(t>=17&&t<20){// dusk
    const f=(t-17)/3;
    sunIntensity=1.0-f*0.8;ambIntensity=1.2-f*0.8;
    fogColor=new THREE.Color().lerpColors(new THREE.Color(0x556677),new THREE.Color(0x110808),f);
  } else {// night
    sunIntensity=0.15;ambIntensity=0.4;fogColor=new THREE.Color(0x040408);
  }
  dir.intensity=sunIntensity;
  scene.fog.color.copy(fogColor);
  scene.background.copy(fogColor);

  // --- FUEL CONSUMPTION ---
  if(as>0.01&&!LIFE.broken){
    c.fuel-=db.fuelRate*as*60;
    if(c.fuel<=0){
      c.fuel=0;
      S.spd=0;
      LIFE.broken=true;
      showNotif('OUT OF GAS! Visit a gas station or buy fuel.',3000);
    }
  }

  // --- GAS STATION PROXIMITY ---
  GAS_STATIONS.forEach(gs=>{
    const dx=S.px-gs.x,dz=S.pz-gs.z;
    if(dx*dx+dz*dz<25&&c.fuel<db.fuelCap){
      const fillCost=Math.round((db.fuelCap-c.fuel)*2);
      if(as<0.05&&c.fuel<db.fuelCap*0.95){
        if(LIFE.money>=fillCost){
          LIFE.money-=fillCost;
          c.fuel=db.fuelCap;
          LIFE.broken=false;
          showNotif(`REFUELED! -$${fillCost}`);
        } else {
          showNotif('Not enough money to refuel!',1500);
        }
      }
    }
  });

  // --- RANDOM BREAKDOWN ---
  if(as>0.2&&!LIFE.broken){
    const condition=(c.engine+c.tires+c.hp)/300;
    if(Math.random()<db.breakChance*(1-condition)*0.1){
      LIFE.broken=true;
      LIFE.breakdownTimer=300;
      S.spd=0;
      const issues=['ENGINE STALL','FLAT TIRE','OVERHEATING'];
      const issue=issues[Math.floor(Math.random()*issues.length)];
      if(issue==='FLAT TIRE')c.tires=Math.max(0,c.tires-20);
      else if(issue==='ENGINE STALL')c.engine=Math.max(0,c.engine-15);
      else c.hp=Math.max(0,c.hp-10);
      showNotif(`BREAKDOWN: ${issue}! Order parts or switch cars.`,3000);
    }
  }

  // --- BREAKDOWN RECOVERY ---
  if(LIFE.broken&&LIFE.breakdownTimer>0){
    LIFE.breakdownTimer--;
    S.spd=0;
    if(LIFE.breakdownTimer<=0&&c.engine>10&&c.tires>10){
      LIFE.broken=false;
      showNotif('Car limping along. Get repairs soon!');
    }
  }

  // --- JOB COMPLETION ---
  if(LIFE.job){
    const dx=S.px-LIFE.job.toX,dz=S.pz-LIFE.job.toZ;
    if(dx*dx+dz*dz<36){
      LIFE.money+=LIFE.job.pay;
      showNotif(`JOB COMPLETE! +$${LIFE.job.pay}`,2500);
      if(jobMarker){scene.remove(jobMarker);jobMarker=null;}
      LIFE.job=null;
    }
    const dist=Math.sqrt(dx*dx+dz*dz);
    const jI=document.getElementById('job-indicator');
    jI.style.display='block';
    jI.textContent=`📦 ${LIFE.job?LIFE.job.toName:''} — ${Math.round(dist)}m`;
  } else {
    document.getElementById('job-indicator').style.display='none';
  }

  // --- WEAR & TEAR ---
  if(as>0.01){
    c.tires-=0.0002*as;
    c.engine-=0.00008*as;
    c.hp-=0.00005*as;
    c.tires=Math.max(0,c.tires);
    c.engine=Math.max(0,c.engine);
    c.hp=Math.max(0,c.hp);
    VLT.MAX_STEER_ANGLE=0.6*db.handling*(c.tires/100*0.5+0.5);
    VLT.MAX_SPEED=db.topSpeed*(c.engine/100*0.4+0.6);
  }

  // --- PREVENT DRIVING WHEN BROKEN ---
  if(c.engine<=5||c.tires<=5){
    LIFE.broken=true;
    S.spd=0;
  }

  // --- JOB MARKER PULSE ---
  if(jobMarker){
    jobMarker.material.opacity=0.15+Math.sin(Date.now()*0.005)*0.15;
    jobMarker.rotation.y+=0.02;
  }

  // --- UPDATE HUD ---
  document.getElementById('money-v').textContent=Math.floor(LIFE.money);
  document.getElementById('fuel-fill').style.width=(c.fuel/db.fuelCap*100)+'%';
  document.getElementById('fuel-fill').style.background=c.fuel<db.fuelCap*0.2?'#f33':'#0c6';
  const avgHp=(c.hp+c.tires+c.engine)/3;
  document.getElementById('hp-fill').style.width=avgHp+'%';
  document.getElementById('hp-fill').style.background=avgHp<30?'#f33':avgHp<60?'#c60':'#0c6';
  // Time HUD
  const hStr=String(LIFE.hour).padStart(2,'0');
  const mStr=String(LIFE.minute).padStart(2,'0');
  document.getElementById('time-hud').textContent=`${LIFE.dayNames[LIFE.day-1]} ${hStr}:${mStr}`;

  // --- FIRED COOLDOWN (in game-hours) ---
  if(LIFE.firedCooldown>0)LIFE.firedCooldown--;
  if(LIFE.firedCooldown<=0)LIFE.fired=false;
}

// Initial car stat application
setTimeout(applyCarStats,500);

loop();
</script>
</body>
</html>
